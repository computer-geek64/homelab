- name: Backup Service
  hosts: all,!Isengard
  vars:
    borg_ssh_key_path: '{{ansible_facts["user_dir"]}}/.ssh/borg_id_rsa'
    borg_command_flags:
      - -c 60
    destinations:
      vps: borg@borg.ashishdsouza.com:/backup/borg/services
      drive: elrond@rivendell:/mnt/backup/borg/services
    paths: []
  vars_prompt:
    - name: service_name
      prompt: Enter service name
      private: false
    - name: borg_archive_name
      prompt: Enter Borg archive name
      private: false
    - name: borg_archive_comment
      prompt: Enter Borg archive comment
      private: false
    - name: destination
      prompt: 'Choose backup destination ({{destinations|join("|")}})'
      private: false
    - name: use_snapshot
      prompt: Use Btrfs snapshot as source? (yes|no)
      private: false
    - name: borg_password
      prompt: Enter Borg password
  tasks:
    - name: Read homelab config
      ansible.builtin.slurp:
        src: '{{ansible_facts["user_dir"]}}/.homelab.json'
      register: homelab_config_file
    - name: Set homelab_config variable
      ansible.builtin.set_fact:
        homelab_config: '{{homelab_config_file.content|b64decode|from_json}}'

    - name: Query service data
      community.postgresql.postgresql_query:
        login_host: '{{homelab_config.database.host}}'
        login_user: '{{homelab_config.database.user}}'
        login_password: '{{homelab_config.database.password}}'
        login_db: '{{homelab_config.database.name}}'
        query: "SELECT storage_type, source FROM service_data WHERE service = '{{service_name}}';"
      register: service_data_query

    - name: Get Docker volume paths
      community.docker.docker_volume_info:
        name: '{{item.source}}'
      when: item.storage_type == 'docker'
      loop: '{{service_data_query.query_result}}'
      register: volumes_info

    - name: Add paths to list
      ansible.builtin.set_fact:
        paths: '{{paths + ["/snapshots/." + item.source if use_snapshot|bool else item.source]}}'
      when: item.storage_type == 'path'
      loop: '{{service_data_query.query_result}}'

    - name: Add Docker volume paths to list
      ansible.builtin.set_fact:
        paths: '{{paths + ["/snapshots/." + item.volume.Options.device if use_snapshot|bool else item.volume.Options.device]}}'
      when: item.volume is defined and item.volume.Options.type == 'none' and not item.volume.Options.device.startswith('/mnt')
      loop: '{{volumes_info.results}}'

    - name: Get stat info for all paths
      ansible.builtin.stat:
        path: '{{item}}'
      loop: '{{paths}}'
      register: paths_stats

    - name: Fail if any path does not exist
      ansible.builtin.fail:
        msg: 'Path {{item.item}} does not exist'
      when: not item.stat.exists
      loop: '{{paths_stats.results}}'

    - name: Add comment to Borg command flags
      vars:
        borg_command_comment_flag: '--comment "{{borg_archive_comment}}"'
      ansible.builtin.set_fact:
        borg_command_flags: '{{borg_command_flags + [borg_command_comment_flag]}}'
      when: borg_archive_comment|length > 0

    - name: Set Borg command
      ansible.builtin.set_fact:
        borg_command: 'borg create {{borg_command_flags|join(" ")}} {{destinations[destination]}}/{{service_name}}::{{borg_archive_name if borg_archive_name else ansible_facts["date_time"].epoch}}'

    - name: Add paths to command
      ansible.builtin.set_fact:
        borg_command: "{{borg_command}} '{{item}}'"
      loop: '{{paths}}'

    - name: Run Borg backup
      environment:
        BORG_RSH: "ssh -i '{{borg_ssh_key_path}}' -o 'ServerAliveInterval=15' -o 'ServerAliveCountMax=4' -o 'StrictHostKeyChecking=no'"
        BORG_PASSPHRASE: '{{borg_password}}'
        BORG_RELOCATED_REPO_ACCESS_IS_OK: 'yes'
        BORG_UNKNOWN_UNENCRYPTED_REPO_ACCESS_IS_OK: 'yes'
      become: true
      ansible.builtin.command:
        cmd: '{{borg_command}}'
