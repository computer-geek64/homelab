watch:
  schedule: 0 9,21 * * *
  jitter: 30s
  firstCheckNotif: false
  runOnStartup: true
  healthchecks:
    baseURL: https://healthchecks.homelab.net/ping/
    uuid: f0bead91-511f-45f2-aef5-eed8350726a8
notif:
  ntfy:
    endpoint: https://ntfy.homelab.net
    topic: diun
    priority: 3
    tags:
      - whale
  webhook:
    endpoint: https://diun.homelab.net/webhook
    method: POST
    headers:
      content-type: application/json
      authorization: diun
    timeout: 10s
providers:
  docker: true
